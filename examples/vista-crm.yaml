version: 1
integration:
  id: vista-crm
  description: >
    Vistasoft REST API — one HTTP target per Vista broker_integration (see examples/vista-brokers-staging.json). Each
    target base_url is https://{vistaBrokerId}-rest.vistahost.com.br. Operations are generated from OpenAPI embedded in
    /doc/ on that host. Store API keys with: hexlane credential set --target <target-id> --token <params.key from BSP> —
    never commit keys. Default broker for op run (no target prefix) is the first target in the list below (sorted by
    target id). Use <target-id>/<op-name> or vista-crm/<op-name> --target <id> for other brokers.
  targets:
    - id: vista-belossa
      tools:
        - type: http
          config:
            base_url: https://belossai-rest.vistahost.com.br
          credential:
            kind: api_token
            acquire_strategy:
              kind: static
            auth:
              kind: query_param
              name: key
    - id: vista-c10-imoveis
      tools:
        - type: http
          config:
            base_url: https://c10imove-rest.vistahost.com.br
          credential:
            kind: api_token
            acquire_strategy:
              kind: static
            auth:
              kind: query_param
              name: key
    - id: vista-city-bh-imoveis
      tools:
        - type: http
          config:
            base_url: https://citybhim-rest.vistahost.com.br
          credential:
            kind: api_token
            acquire_strategy:
              kind: static
            auth:
              kind: query_param
              name: key
    - id: vista-massote-brokers
      tools:
        - type: http
          config:
            base_url: https://cli40706-rest.vistahost.com.br
          credential:
            kind: api_token
            acquire_strategy:
              kind: static
            auth:
              kind: query_param
              name: key
    - id: vista-posh-imoveis
      tools:
        - type: http
          config:
            base_url: https://poshimov-rest.vistahost.com.br
          credential:
            kind: api_token
            acquire_strategy:
              kind: static
            auth:
              kind: query_param
              name: key
    - id: vista-smart-brokers
      tools:
        - type: http
          config:
            base_url: https://smartbro-rest.vistahost.com.br
          credential:
            kind: api_token
            acquire_strategy:
              kind: static
            auth:
              kind: query_param
              name: key
    - id: vista-union-sp
      tools:
        - type: http
          config:
            base_url: https://unionsp3-rest.vistahost.com.br
          credential:
            kind: api_token
            acquire_strategy:
              kind: static
            auth:
              kind: query_param
              name: key
    - id: vista-vivar-imoveis
      tools:
        - type: http
          config:
            base_url: https://vivar24164-rest.vistahost.com.br
          credential:
            kind: api_token
            acquire_strategy:
              kind: static
            auth:
              kind: query_param
              name: key
  operations:
    - name: get-imoveis-buscaavancada
      tool: http
      description: Busca Avançada a dados de imóveis
      tags:
        - imoveis
      parameters:
        - name: pesquisa
          type: string
          required: true
          description: JSON com os critérios de busca desejados (string/json)
      execution:
        method: GET
        path: /imoveis/buscaAvancada
        query:
          pesquisa: '{{ pesquisa }}'
    - name: get-imoveis-listar
      tool: http
      description: Listagem de imóveis da imobiliária que estão disponíveis
      tags:
        - imoveis
      parameters:
        - name: pesquisa
          type: string
          required: true
          description: JSON com os critérios de busca desejados (string/json)
        - name: finalidade
          type: string
          required: true
          description: venda, aluguel, não informe para pesquisar por ambos (array)
        - name: showtotal
          type: string
          required: true
          description: 1|0 Se deve mostrar os totais de páginas e resultados (string)
        - name: v2
          type: boolean
          required: true
          description: 1|0 (boolean)
        - name: mobile_user
          type: number
          required: true
          description: Usuário logado (number)
        - name: imoveis
          type: string
          required: true
          description: Parametro para buscar imóveis locais, da rede e fora da rede/ local,rede,foraDaRede (string)
      execution:
        method: GET
        path: /imoveis/listar
        query:
          pesquisa: '{{ pesquisa }}'
          finalidade: '{{ finalidade }}'
          showtotal: '{{ showtotal }}'
          v2: '{{ v2 }}'
          mobile_user: '{{ mobile_user }}'
          imoveis: '{{ imoveis }}'
    - name: get-clientes-listar
      tool: http
      description: Listagem de clientes da imobiliária que estão disponíveis
      tags:
        - clientes
      parameters:
        - name: pesquisa
          type: string
          required: true
          description: JSON com os critérios de busca desejados (string/json)
        - name: showtotal
          type: string
          required: true
          description: 1|0 Se deve mostrar os totais de páginas e resultados (string)
      execution:
        method: GET
        path: /clientes/listar
        query:
          pesquisa: '{{ pesquisa }}'
          showtotal: '{{ showtotal }}'
    - name: get-clientes-imoveisfavoritos
      tool: http
      description: Listagem imóveis favoritos de um cliente
      tags:
        - clientes
      parameters:
        - name: cliente
          type: string
          required: true
          description: Código do cliente (string)
      execution:
        method: GET
        path: /clientes/imoveisFavoritos
        query:
          cliente: '{{ cliente }}'
    - name: get-clientes-detalhes
      tool: http
      description: Visualiza os dados de um cliente disponível
      tags:
        - clientes
      parameters:
        - name: pesquisa
          type: string
          required: true
          description: JSON com os critérios de busca desejados (string/json)
        - name: is_ativo
          type: string
          required: true
          description: Quando passado sim, retorno um campilado dos status configurados, dizendo se é ativo ou não (string)
      execution:
        method: GET
        path: /clientes/detalhes
        query:
          pesquisa: '{{ pesquisa }}'
          is_ativo: '{{ is_ativo }}'
    - name: post-clientes-detalhes
      tool: http
      description: Inserir um novo cliente
      tags:
        - clientes
      readOnly: false
      parameters:
        - name: cadastro
          type: string
          required: true
          description: JSON com os dados do cliente a ser cadastrado (string)
      execution:
        method: POST
        path: /clientes/detalhes
        query:
          cadastro: '{{ cadastro }}'
    - name: put-clientes-detalhes
      tool: http
      description: Atualiza os dados de um cliente
      tags:
        - clientes
      readOnly: false
      parameters:
        - name: cadastro
          type: string
          required: true
          description: JSON com os dados do cliente a ser cadastrado (string/json)
        - name: cliente
          type: integer
          required: true
          description: Código do cliente a ser atualizado (integer)
      execution:
        method: PUT
        path: /clientes/detalhes
        query:
          cadastro: '{{ cadastro }}'
          cliente: '{{ cliente }}'
    - name: get-imoveis-listarconteudo
      tool: http
      description: Retorna uma lista de conteúdos distintos de uma informação do imóvel
      tags:
        - imoveis
      parameters:
        - name: pesquisa
          type: string
          required: true
          description: JSON com os critérios de busca desejados (string/json)
        - name: imoveis
          type: string
          required: true
          description: >-
            Parâmetro que irá definir a busca por dados de imóveis em rede ou não. Opções do parâmetro: rede|local
            (string/json)
      execution:
        method: GET
        path: /imoveis/listarConteudo
        query:
          pesquisa: '{{ pesquisa }}'
          imoveis: '{{ imoveis }}'
    - name: get-clientes-listarconteudo
      tool: http
      description: Retorna uma lista de conteúdos distintos de uma informação do cliente
      tags:
        - clientes
      parameters:
        - name: pesquisa
          type: string
          required: true
          description: JSON com os critérios de busca desejados (string/json)
      execution:
        method: GET
        path: /clientes/listarConteudo
        query:
          pesquisa: '{{ pesquisa }}'
    - name: get-usuarios-listar
      tool: http
      description: Listar usuários ativos na imobiliária
      tags:
        - usuarios
      parameters:
        - name: pesquisa
          type: string
          required: true
          description: >-
            JSON com os campos de busca desejados; Campo paginação (json): 'paginacao':{'pagina':1,'quantidade':10}
            (string/json)
        - name: showtotal
          type: boolean
          required: true
          description: Se deve mostrar os totais de páginas e resultados (boolean)
      execution:
        method: GET
        path: /usuarios/listar
        query:
          pesquisa: '{{ pesquisa }}'
          showtotal: '{{ showtotal }}'
    - name: get-imoveis-listarcampos
      tool: http
      description: Listagem dos campos disponíveis para integração com a API
      tags:
        - imoveis
      parameters:
        - name: desc
          type: boolean
          required: true
          description: Listar a descrição de cada campo (boolean)
        - name: tipo
          type: string
          required: true
          description: 'Tipo de campo: imoveis | carac | infra | Agencia | Foto | Corretor | Prontuarios (string)'
      execution:
        method: GET
        path: /imoveis/listarcampos
        query:
          desc: '{{ desc }}'
          tipo: '{{ tipo }}'
    - name: get-clientes-listarcampos
      tool: http
      description: Listagem dos campos disponíveis para integração com a API
      tags:
        - clientes
      parameters:
        - name: desc
          type: boolean
          required: true
          description: Listar a descrição de cada campo (boolean)
        - name: tipo
          type: string
          required: true
          description: Filtrar por categoria de campos (string)
      execution:
        method: GET
        path: /clientes/listarcampos
        query:
          desc: '{{ desc }}'
          tipo: '{{ tipo }}'
    - name: get-usuarios-listarcampos
      tool: http
      description: Listagem dos campos disponíveis para integração com a API
      tags:
        - usuarios
      parameters:
        - name: desc
          type: boolean
          required: true
          description: Listar a descrição de cada campo (boolean)
        - name: tipo
          type: string
          required: true
          description: Filtrar por categoria de campos (string)
      execution:
        method: GET
        path: /usuarios/listarcampos
        query:
          desc: '{{ desc }}'
          tipo: '{{ tipo }}'
    - name: get-chaveiros-listarcampos
      tool: http
      description: Listagem dos campos disponíveis para integração com a API
      tags:
        - chaveiros
      parameters:
        - name: desc
          type: boolean
          required: true
          description: Listar a descrição de cada campo (boolean)
        - name: tipo
          type: string
          required: true
          description: Filtrar por categoria de campos (string)
      execution:
        method: GET
        path: /chaveiros/listarcampos
        query:
          desc: '{{ desc }}'
          tipo: '{{ tipo }}'
    - name: get-retiradas-listarcampos
      tool: http
      description: Listagem dos campos disponíveis para integração com a API
      tags:
        - chaveiros
      parameters:
        - name: desc
          type: boolean
          required: true
          description: Listar a descrição de cada campo (boolean)
        - name: tipo
          type: string
          required: true
          description: Filtrar por categoria de campos (string)
      execution:
        method: GET
        path: /retiradas/listarcampos
        query:
          desc: '{{ desc }}'
          tipo: '{{ tipo }}'
    - name: get-agenda-listarcampos
      tool: http
      description: Lista os campos disponíveis para o método listar agenda
      tags:
        - agenda
      parameters:
        - name: desc
          type: boolean
          required: true
          description: Listar a descrição de cada campo (boolean)
        - name: tipo
          type: string
          required: true
          description: Filtrar por categoria de campos (string)
      execution:
        method: GET
        path: /agenda/listarcampos
        query:
          desc: '{{ desc }}'
          tipo: '{{ tipo }}'
    - name: get-agencias-listar
      tool: http
      description: Retorna uma lista de agências da imobiliária
      tags:
        - agencias
      parameters:
        - name: pesquisa
          type: string
          required: true
          description: JSON com os critérios de busca desejados (string/json)
      execution:
        method: GET
        path: /agencias/listar
        query:
          pesquisa: '{{ pesquisa }}'
    - name: get-agencias-listarcampos
      tool: http
      description: Listagem dos campos disponíveis para integração com a API
      tags:
        - agencias
      parameters:
        - name: desc
          type: boolean
          required: true
          description: Listar a descrição de cada campo (boolean)
        - name: tipo
          type: string
          required: true
          description: Filtrar por categoria de campos (string)
      execution:
        method: GET
        path: /agencias/listarcampos
        query:
          desc: '{{ desc }}'
          tipo: '{{ tipo }}'
    - name: get-propostas-listarcampos
      tool: http
      description: Listagem dos campos disponíveis para integração com a API
      tags:
        - propostas
      execution:
        method: GET
        path: /propostas/listarcampos
    - name: get-negociacoes-listarcampos
      tool: http
      description: Listagem dos campos disponíveis para integração com a API
      tags:
        - negociacoes
      execution:
        method: GET
        path: /negociacoes/listarcampos
    - name: get-imoveis-destaques
      tool: http
      description: Retorna a lista de imoveis em destaque da imobiliária
      tags:
        - imoveis
      parameters:
        - name: pesquisa
          type: string
          required: true
          description: JSON com os critérios de busca desejados (string/json)
        - name: finalidade
          type: string
          required: true
          description: venda ou aluguel, não informe para pesquisar por ambos (string)
      execution:
        method: GET
        path: /imoveis/destaques
        query:
          pesquisa: '{{ pesquisa }}'
          finalidade: '{{ finalidade }}'
    - name: get-imoveis-finalidades
      tool: http
      description: 'Retorna as finalidades da imobiliária: Venda, Aluguel e/ou Temporada'
      tags:
        - imoveis
      parameters:
        - name: allStatus
          type: string
          required: true
          description: Parâmetro que quando passado como true ele retorna a lista de status associada as finalidades (string/json)
      execution:
        method: GET
        path: /imoveis/finalidades
        query:
          allStatus: '{{ allStatus }}'
    - name: get-logotipo
      tool: http
      description: Retorna a URL do logotipo da empresa
      tags:
        - imobiliaria
      execution:
        method: GET
        path: /logotipo
    - name: get-siteurl
      tool: http
      description: Retorna a URL do site da imobiliária
      tags:
        - imobiliaria
      execution:
        method: GET
        path: /siteurl
    - name: get-emailauth
      tool: http
      description: Retorna credenciais de autenticação de e-mail
      tags:
        - imobiliaria
      execution:
        method: GET
        path: /emailauth
    - name: post-clientes-anexos
      tool: http
      description: Inserir um novo anexo no cadastro cliente
      tags:
        - clientes
      readOnly: false
      parameters:
        - name: cadastro
          type: string
          required: true
          description: JSON com os dados do anexo a ser cadastrado (string)
      execution:
        method: POST
        path: /clientes/anexos
        query:
          cadastro: '{{ cadastro }}'
    - name: get-imoveis-detalhes
      tool: http
      description: Visualiza os dados de um imóvel disponível
      tags:
        - imoveis
      parameters:
        - name: pesquisa
          type: string
          required: true
          description: JSON com os critérios de busca desejados (string/json)
        - name: imovel
          type: string
          required: true
          description: Código do imóvel (obrigatório na API; ausente no OpenAPI). (string)
      execution:
        method: GET
        path: /imoveis/detalhes
        query:
          pesquisa: '{{ pesquisa }}'
          imovel: '{{ imovel }}'
    - name: post-imoveis-detalhes
      tool: http
      description: Inserir um novo cadastro de imovel
      tags:
        - imoveis
      readOnly: false
      parameters:
        - name: cadastro
          type: string
          required: true
          description: >-
            JSON com os dados do imóvel a ser cadastrado obs:caso for enviado o parametro na URI 'office' para
            atualizar, torna-se obrigatório ultilizar o CODIGO em cadastro[fields][Imovel] (string)
        - name: office
          type: integer
          required: true
          description: >-
            Este parametro vai na URI, para que o Office possa atualizar o imóvel forçando o CODIGO mesmo que
            configuração da imobiliária for PLACA (integer)
      execution:
        method: POST
        path: /imoveis/detalhes
        query:
          cadastro: '{{ cadastro }}'
          office: '{{ office }}'
    - name: put-imoveis-detalhes
      tool: http
      description: Atualizar um cadastro de imovel
      tags:
        - imoveis
      readOnly: false
      parameters:
        - name: cadastro
          type: string
          required: true
          description: JSON com os dados do imóvel a ser atualizado (string/json)
        - name: imovel
          type: integer
          required: true
          description: >-
            Código do imóvel a ser atualizado obs:caso for enviado o parametro na URI 'office' torna-se obrigatório
            ultilizar o CODIGO (integer)
        - name: office
          type: integer
          required: true
          description: >-
            Este parametro vai na URI, para que o Office possa atualizar o imóvel forçando o CODIGO mesmo que
            configuração da imobiliária for PLACA (integer)
      execution:
        method: PUT
        path: /imoveis/detalhes
        query:
          cadastro: '{{ cadastro }}'
          imovel: '{{ imovel }}'
          office: '{{ office }}'
    - name: delete-imoveis-detalhes
      tool: http
      description: Excluir um cadastro de imovel, seus corretores ou anexos
      tags:
        - imoveis
      readOnly: false
      parameters:
        - name: delete_imovel
          type: string
          required: true
          description: Confirmação se deve excluir o imóvel inteiro e seus dados associados (string)
        - name: corretor
          type: string
          required: true
          description: Remover um ou mais corretores (string/json)
        - name: cadastro
          type: string
          required: true
          description: JSON para Foto ou Anexo (string/json)
      execution:
        method: DELETE
        path: /imoveis/detalhes
        query:
          delete_imovel: '{{ delete_imovel }}'
          corretor: '{{ corretor }}'
          cadastro: '{{ cadastro }}'
    - name: post-compartilhamento-email
      tool: http
      description: Dispara e-mail de compartilhamento de imóveis e registra históricos, parte do AppMobile
      tags:
        - compartilhamento
      readOnly: false
      parameters:
        - name: data
          type: string
          required: true
          description: >-
            Dados do email:
            {imoveis:{cod_imo:{Codigo:'',Moeda:'',ValorVendaPadrao:'',ValorLocacaoPadrao:'',ValorDiariaPadrao:''}},Cliente:[{Codigo:'',Nome:'',Email:''}],purpose:'',mensagem:''}
            (string)
        - name: mobile_user
          type: string
          required: true
          description: Código do corretor logado (string)
      execution:
        method: POST
        path: /compartilhamento/email
        query:
          data: '{{ data }}'
          mobile_user: '{{ mobile_user }}'
    - name: post-registrar-historico
      tool: http
      description: Registra histórico de atividades, parte do AppMobile
      tags:
        - atividades
      readOnly: false
      parameters:
        - name: data
          type: string
          required: true
          description: >-
            Dados da atividade: {fields:{Cliente:'',Imovel:'',Corretor:'',Tipo:'',Assunto:'',Mensagem:'',Texto:''}}
            (string)
        - name: mobile_user
          type: string
          required: true
          description: Código do corretor logado (string)
      execution:
        method: POST
        path: /registrar/historico
        query:
          data: '{{ data }}'
          mobile_user: '{{ mobile_user }}'
    - name: post-imoveis-fotos
      tool: http
      description: Insere uma foto no imóvel
      tags:
        - fotos-de-imovel
      readOnly: false
      parameters:
        - name: imovel
          type: string
          required: true
          description: Referência do imóvel (Codigo) (string)
        - name: cadastro
          type: string
          required: true
          description: Dados da foto a ser inserida (string)
        - name: async
          type: string
          required: true
          description: Utilize para processamento assíncrono (string)
      execution:
        method: POST
        path: /imoveis/fotos
        query:
          imovel: '{{ imovel }}'
          cadastro: '{{ cadastro }}'
          async: '{{ async }}'
    - name: put-imoveis-fotos
      tool: http
      description: Atualiza uma foto do imóvel
      tags:
        - fotos-de-imovel
      readOnly: false
      parameters:
        - name: imovel
          type: string
          required: true
          description: Referência do imóvel (Codigo) (string)
        - name: foto
          type: integer
          required: true
          description: Código da foto do imóvel (ImagemCodigo) (integer)
        - name: cadastro
          type: string
          required: true
          description: Dados da foto a serem alterados (string/json)
      execution:
        method: PUT
        path: /imoveis/fotos
        query:
          imovel: '{{ imovel }}'
          foto: '{{ foto }}'
          cadastro: '{{ cadastro }}'
    - name: delete-imoveis-fotos
      tool: http
      description: Deleta uma foto do imóvel
      tags:
        - fotos-de-imovel
      readOnly: false
      parameters:
        - name: imovel
          type: string
          required: true
          description: Referência do imóvel (Codigo) (string)
        - name: foto
          type: integer
          required: true
          description: Código da foto do imóvel (ImagemCodigo) (integer)
      execution:
        method: DELETE
        path: /imoveis/fotos
        query:
          imovel: '{{ imovel }}'
          foto: '{{ foto }}'
    - name: put-imoveis-fotos-ordem
      tool: http
      description: Reordena todas as fotos de um imóvel
      tags:
        - fotos-de-imovel
      readOnly: false
      parameters:
        - name: imovel
          type: string
          required: true
          description: Referência do imóvel (Codigo) (string)
        - name: ordem
          type: string
          required: true
          description: Códigos das fotos do imóvel na ordem desejada (ImagemCodigo) (list)
      execution:
        method: PUT
        path: /imoveis/fotos/ordem
        query:
          imovel: '{{ imovel }}'
          ordem: '{{ ordem }}'
    - name: post-rdlead
      tool: http
      description: Inserção de Leads vindos do POST da RD Station
      tags:
        - integracoes
      readOnly: false
      execution:
        method: POST
        path: /rdlead
    - name: post-login
      tool: http
      description: Valida um login de usuario
      tags:
        - leads
      readOnly: false
      parameters:
        - name: email
          type: string
          required: true
          description: E-mail do usuário (string)
        - name: senha
          type: string
          required: true
          description: Senha do usuário (string)
        - name: mobile_details
          type: string
          required: true
