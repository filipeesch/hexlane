version: 1
app:
  id: my-app
  description: "My application"

  environments:
    - name: production
      base_url: https://api.example.com

      profiles:
        # ─── Option A: fetch a token automatically from an auth endpoint ────────
        - name: default
          kind: api_token
          acquire_strategy:
            kind: http
            method: POST
            url: https://auth.example.com/token
            output_mapping:
              kind: api_token
              token_path: access_token
              # expires_at_path: expires_at   # optional — JWT exp claim is read automatically
          renewal_policy:
            ttl: 3600 # fallback expiry in seconds (if no exp claim)
            renew_before_expiry: 300

        # ─── Option B: static JWT — loaded once via `hexlane credential set` ───
        - name: static-service
          kind: api_token
          acquire_strategy:
            kind: static
          # auth defaults to Bearer; override if the API expects something else:
          # auth:
          #   kind: header
          #   name: X-Api-Key
          # auth:
          #   kind: query_param
          #   name: api_key

        # ─── Option C: static DB connection — loaded once via `hexlane credential set` ───
        - name: static-db
          kind: db_connection
          acquire_strategy:
            kind: static
          # Load with:
          #   hexlane credential set --app my-app --env production --profile static-db \
          #     --connection-string "postgresql://user:pass@host:5432/dbname?sslmode=require"
          # Supported schemes: postgresql, mysql, sqlserver, oracle

        # ─── Option D: database connection via shell command ────────────────────
        - name: readonly
          kind: db_connection
          acquire_strategy:
            kind: shell
            command: "db-cli credentials get --env production --role readonly --output json"
            output_mapping:
              kind: db_connection
              unwrap_array: true # if the command outputs [{...}], extracts first element
              host_path: hostname
              port_path: port
              user_path: username
              password_path: password
              dbname_path: database
          renewal_policy:
            ttl: 172800 # 48 hours
            renew_before_expiry: 3600
