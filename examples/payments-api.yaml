version: 1
app:
  id: payments-api
  description: Payments service — REST API and PostgreSQL DB

  environments:
    - name: forno
      base_url: https://opa-standalone.apps.core-frn.habitat.zone

      profiles:
        - name: support-user
          kind: api_token
          acquire_strategy:
            kind: http
            method: GET
            url: https://opa-standalone.apps.core-frn.habitat.zone/v1/data/quintoandar/s2s/token
            output_mapping:
              kind: api_token
              token_path: result.token
              error_path: result.error
              trace_id_path: decision_id
          renewal_policy:
            ttl: 1800 # 30 minutes
            renew_before_expiry: 300

        - name: readonly
          kind: db_connection
          acquire_strategy:
            kind: shell
            command: qli db get -e forno -r readonly payments-api --ttl=48h -o json
            output_mapping:
              kind: db_connection
              unwrap_array: true
              host_path: hostname
              port_path: port
              user_path: username
              password_path: password
              dbname_path: database
              lease_id_path: id
          renewal_policy:
            ttl: 172800 # 48 hours
            renew_before_expiry: 3600

operations:
  - name: get-order
    description: Fetch a single order by ID
    kind: api
    profile: support-user
    defaultEnv: forno
    tags: [orders, read]
    readOnly: true
    parameters:
      - name: orderId
        type: string
        required: true
        description: Unique order identifier
    execution:
      method: GET
      path: /api/v1/orders/{{ orderId }}
    examples:
      - description: Fetch order 123
        command: hexlane op run payments-api/get-order --env forno --profile support-user --param orderId=123

  - name: find-order-row
    description: Look up a raw order record from the database by ID
    kind: db
    profile: readonly
    defaultEnv: forno
    tags: [orders, read, db]
    readOnly: true
    parameters:
      - name: orderId
        type: integer
        required: true
        description: Numeric order primary key
    execution:
      sql: "SELECT * FROM orders WHERE id = :orderId"
    examples:
      - description: Find order row for id 123
        command: hexlane op run payments-api/find-order-row --env forno --profile readonly --param orderId=123
