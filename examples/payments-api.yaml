version: 1
app:
  id: payments-api
  description: Payments service — REST API and DB

  environments:
    - name: production
      base_url: https://api.example.com

      profiles:
        - name: support-user
          kind: api_token
          acquire_strategy:
            kind: http
            method: GET
            url: https://auth.example.com/v1/token
            output_mapping:
              kind: api_token
              token_path: result.token
              error_path: result.error
              trace_id_path: decision_id
          renewal_policy:
            ttl: 1800 # 30 minutes
            renew_before_expiry: 300

        - name: readonly
          kind: db_connection
          acquire_strategy:
            kind: shell
            command: db-cli credentials get --env production --role readonly --app payments-api --ttl=48h --output json
            output_mapping:
              kind: db_connection
              unwrap_array: true
              host_path: hostname
              port_path: port
              user_path: username
              password_path: password
              dbname_path: database
              lease_id_path: id
          renewal_policy:
            ttl: 172800 # 48 hours
            renew_before_expiry: 3600

        # Static JWT profile — token loaded once via `hexlane credential set`
        - name: static-integration
          kind: api_token
          acquire_strategy:
            kind: static
          # auth defaults to Bearer; override if the API expects a different header:
          # auth:
          #   kind: header
          #   name: X-Api-Key
          # renewal_policy omitted — expiry from JWT exp claim or non-expiring

operations:
  - name: get-order
    description: Fetch a single order by ID
    kind: api
    profile: support-user
    defaultEnv: production
    tags: [orders, read]
    readOnly: true
    parameters:
      - name: orderId
        type: string
        required: true
        description: Unique order identifier
    execution:
      method: GET
      path: /api/v1/orders/{{ orderId }}
    examples:
      - description: Fetch order 123
        command: hexlane op run payments-api/get-order --env production --profile support-user --param orderId=123

  - name: find-order-row
    description: Look up a raw order record from the database by ID
    kind: db
    profile: readonly
    defaultEnv: production
    tags: [orders, read, db]
    readOnly: true
    parameters:
      - name: orderId
        type: integer
        required: true
        description: Numeric order primary key
    execution:
      sql: "SELECT * FROM orders WHERE id = :orderId"
    examples:
      - description: Find order row for id 123
        command: hexlane op run payments-api/find-order-row --env production --profile readonly --param orderId=123
